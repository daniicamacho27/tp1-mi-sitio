<section id="Contacto">
    <h2> Formulario de Contacto</h2>
    <form>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required minlength="3">

        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <br><br>

        <label for="tel">Telefono:</label>
        <input type="tel" id="tel" name="tel" pattern="[0-9]{10} required">

        <br><br> 

        <label for="motivo">Motivo:</label>
        <select id="motivo" name="motivo">
            <option value="">Seleccione</option>
            <option value="consulta">Consulta</option>
            <option value="soporte">Soporte</option>
            <option value="otro">Otro</option>
        </select>

        <br><br>

        <label for="mensaje">Mensaje:</label>
        <textarea id="mensaje" name="mensaje" required minlength="10"></textarea>

        <br><br>

        <label>
            <input type="checkbox" required>
            Acepto los términos y condiciones
        </label>

        <br><br>

        <button type="submit">Enviar</button>
        <p>Gracias por contactarme</p>
        
    </form>
</section>
